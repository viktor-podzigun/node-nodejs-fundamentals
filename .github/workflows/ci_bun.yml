name: Bun CI

on:
  push:
    paths-ignore:
      - "*.md"
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.0"

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/work/node-nodejs-fundamentals/node-nodejs-fundamentals/bun.lockb
          key: ${{ runner.os }}-bun-cache-v1-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-v1-

      - name: Run tests
        run: |
          bun install
          bun test
